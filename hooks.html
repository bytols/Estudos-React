<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body>

    <div id="root"></div>

    <script type="text/babel">



        function Counter() {

            const [counter, setCounter]= React.useState(1);

            if (counter > 20) {
                return <p> maior que 20 </p>
            }

            return (
                <>
                    <p> Contador: {counter} </p>

                    <p> { counter> 10 ? 'maior que 10' : "Menor que 10 "} </p>

                    { counter > 15 && <p>Maior que 15</p>}

                    <button onClick={() => setCounter(10)}> Atualizar </button>  
                    <button onClick={() => setCounter((prevValue) => prevValue + 1)}> Incrementar </button>    
                    <button onClick={() => setCounter((prevValue) => prevValue - 1)}> Decrementar </button>           
       
                </>

            )
        }

        function App() {
            return (
                <main>
                    <h1>Hello World</h1>
                    <Counter />
                </main>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>

</body>

</html>
