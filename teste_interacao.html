<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.js"></script>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">

        function Alert1() {

            function handleClick() {
                alert('Alerta 1');
            }

            return (
                <button type="button" onClick={handleClick}>Mostrar Alerta</button>
            )
        }


        function Alert2() {

            function handleClick(msg) {
                alert(msg);
            }

            return (
                <button type="button" onClick={() => handleClick('Alerta 2')}>Mostrar Alerta 2</button>
            )
        }

        function Alert3() {

            function handleClick(event) {
                alert(event.target.previousSibling.value);
            }
            
            return (
                <div>
                    <input type="text" placeholder="Digite Algo"/>
                    <button onClick={handleClick}>
                        Mostrar Alerta do Campo de Texto
                    </button>    
                </div>
            )
        }

        function Alert4() {
            function handleClick(event) {
                console.log(event.target.value);
            }

            return (
                <div>
                    <input type="text" placeholder="Digite Algo" onChange={handleClick}/>

                </div>
            )
        }

        function App() {
            return (
                <main class="p-3">
                    <h1>Hello World</h1>
                    <Alert1 />
                    <Alert2 />
                    <Alert3 />
                    <Alert4 />
                </main>
            )
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>

</body>

</html>
